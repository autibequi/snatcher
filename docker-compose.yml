services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.1
    container_name: snatcher-evolution
    ports:
      - "127.0.0.1:3200:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=http://snatcher-evolution:8080
      - SERVER_PORT=8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evolution}@snatcher-evo-postgres:5432/evolution?schema=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://snatcher-evo-redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evo
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR,WARN
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_CLIENT=Promo Snatcher
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evo_instances:/evolution/instances
    depends_on:
      - evo-postgres
      - evo-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  evo-postgres:
    image: postgres:15-alpine
    container_name: snatcher-evo-postgres
    # Tuning para baixo consumo de RAM no Pi
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
      -c wal_buffers=4MB
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evolution}
    volumes:
      - evo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  evo-redis:
    image: redis:7-alpine
    container_name: snatcher-evo-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - evo_redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96m

  backend:
    image: ghcr.io/autibequi/snatcher-backend:latest
    container_name: snatcher-backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # shm_size necessário para o Chromium (Amazon scraping) não crashar no Pi
    shm_size: '128mb'
    volumes:
      - ./backend-python/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - TZ_NAME=${TZ_NAME:-America/Sao_Paulo}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - EVOLUTION_URL=http://snatcher-evolution:8080
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AMZ_TRACKING_ID=${AMZ_TRACKING_ID:-}
      - PUBLIC_URL=${PUBLIC_URL}
      - BASE_DOMAIN=${BASE_DOMAIN:-snatcher.autibequi.com}
      - ML_CLIENT_ID=${ML_CLIENT_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s   # Chromium ARM demora mais pra inicializar (Python); Go ignora esse delay

  redirect:
    image: ghcr.io/autibequi/snatcher-redirect:latest
    container_name: snatcher-redirect
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - ./backend-python/data:/data:ro
    environment:
      - DB_PATH=/data/app.db
    restart: unless-stopped
    profiles: [redirect]   # opt-in: arm64/Pi apenas
    deploy:
      resources:
        limits:
          memory: 32m
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    image: ghcr.io/autibequi/snatcher-frontend:latest
    container_name: snatcher-frontend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${FRONTEND_PORT:-6060}:80"
    environment:
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: snatcher-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    profiles: [tunnel]
    depends_on:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m

  watchtower:
    image: containrrr/watchtower
    container_name: snatcher-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=900      # verifica a cada 15 min
      - WATCHTOWER_CLEANUP=true           # remove imagens velhas
      - WATCHTOWER_LABEL_ENABLE=true      # só atualiza containers com label
      - WATCHTOWER_INCLUDE_STOPPED=false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32m

  app-postgres:
    image: postgres:16-alpine
    container_name: snatcher-app-postgres
    environment:
      - POSTGRES_DB=snatcher
      - POSTGRES_USER=snatcher
      - POSTGRES_PASSWORD=${SNATCHER_DB_PASS:-devpass}
    volumes:
      - app_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snatcher -d snatcher"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  evo_instances:
  evo_pg_data:
  evo_redis_data:
  app_pg_data:
