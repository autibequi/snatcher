# Dev — todo tráfego entre serviços usa a rede Docker (DNS pelos container_name).
# Acesso pelo host: localhost:6060 (UI), :8000 (API direta), :3200 (Evolution direta).
# Tunnel Cloudflare: COMPOSE_PROFILES=tunnel make dev

networks:
  snatcher_internal:
    name: snatcher_internal
    driver: bridge

services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.1
    container_name: snatcher-evolution
    ports:
      - "3200:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=http://snatcher-evolution:8080
      - SERVER_PORT=8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evolution}@snatcher-evo-postgres:5432/evolution?schema=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://snatcher-evo-redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evo
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG
      - LOG_BAILEYS=info
      - CONFIG_SESSION_PHONE_CLIENT=Promo Snatcher
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evo_instances:/evolution/instances
    depends_on:
      - evo-postgres
      - evo-redis
    restart: unless-stopped
    networks:
      - snatcher_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  evo-postgres:
    image: postgres:15-alpine
    container_name: snatcher-evo-postgres
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evolution}
    volumes:
      - evo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - snatcher_internal

  evo-redis:
    image: redis:7-alpine
    container_name: snatcher-evo-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - evo_redis_data:/data
    restart: unless-stopped
    networks:
      - snatcher_internal

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: snatcher-backend
    ports:
      - "8000:8000"
    volumes:
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/var/run/podman.sock:ro
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - TZ_NAME=${TZ_NAME:-America/Sao_Paulo}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - EVOLUTION_URL=http://snatcher-evolution:8080
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AMZ_TRACKING_ID=${AMZ_TRACKING_ID:-}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:6060}
      - BASE_DOMAIN=${BASE_DOMAIN:-localhost}
      - ML_CLIENT_ID=${ML_CLIENT_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    depends_on:
      evolution:
        condition: service_started
    networks:
      - snatcher_internal

  frontend:
    image: node:20-alpine
    container_name: snatcher-frontend
    working_dir: /app
    ports:
      - "6060:80"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 80"]
    environment:
      - NODE_ENV=development
      - VITE_BASE_DOMAIN=${BASE_DOMAIN:-localhost}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - snatcher_internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: snatcher-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: unless-stopped
    profiles: [tunnel]
    depends_on:
      - frontend
    networks:
      - snatcher_internal

  snatcher-postgres:
    image: postgres:16-alpine
    container_name: snatcher-app-postgres
    environment:
      - POSTGRES_DB=snatcher
      - POSTGRES_USER=snatcher
      - POSTGRES_PASSWORD=${SNATCHER_DB_PASS:-devpass}
    ports:
      - "5433:5432"
    volumes:
      - snatcher_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - snatcher_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snatcher -d snatcher"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  evo_instances:
  evo_pg_data:
  evo_redis_data:
  frontend_node_modules:
  snatcher_pg_data:
