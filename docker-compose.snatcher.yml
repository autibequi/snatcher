# Override para dev local — substitui imagens ghcr por builds locais.
# Uso: docker compose -f docker-compose.yml -f docker-compose.snatcher.yml up --build
services:
  backend:
    image: snatcher-backend-go-local
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    volumes:
      - ./backend-go/data:/app/data
    environment:
      - DATABASE_URL=postgres://snatcher:${SNATCHER_DB_PASS:-devpass}@snatcher-app-postgres:5432/snatcher?sslmode=disable
      - PORT=8000
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - JWT_SECRET=${AUTH_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOMAXPROCS=2
      - EVOLUTION_URL=http://snatcher-evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - PUBLIC_BASE_URL=${PUBLIC_URL:-http://localhost:8000}
    depends_on:
      app-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  # redirect agora está integrado no backend-go (porta 8000)
  redirect:
    profiles: ["redirect-disabled"]

  # Watchtower não funciona com Podman rootless (socket diferente)
  watchtower:
    profiles: ["watchtower-disabled"]

  frontend:
    image: snatcher-frontend-local
    build:
      context: ./frontend
      dockerfile: Dockerfile
