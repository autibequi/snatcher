services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.1
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=http://evolution:8080
      - SERVER_PORT=8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS:-evolution}@evo-postgres:5432/evolution?schema=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evo-redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evo
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR,WARN
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_CLIENT=Promo Snatcher
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evo_instances:/evolution/instances
    depends_on:
      evo-postgres:
        condition: service_started
      evo-redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  evo-postgres:
    image: postgres:15-alpine
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-evolution}
    volumes:
      - evo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  evo-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - evo_redis_data:/data
    restart: unless-stopped

  snatcher-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=snatcher
      - POSTGRES_USER=snatcher
      - POSTGRES_PASSWORD=${SNATCHER_DB_PASS:-snatcher}
    volumes:
      - snatcher-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snatcher"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend-go
      dockerfile: Dockerfile
      target: server
    volumes:
      - snatcher-data:/app/data
    environment:
      # Mantém ENV=dev por omissão. Coolify ou outro host pode injectar ENV=production;
      # nesse caso defina ADMIN_PASS (≠ admin) e JWT_SECRET (≠ changeme) nos secrets.
      - ENV=${ENV:-dev}
      - DATABASE_URL=postgres://snatcher:${SNATCHER_DB_PASS:-snatcher}@snatcher-postgres:5432/snatcher?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-please}
      # Com ENV=prod|production, ADMIN_PASS não pode ser "admin" (ver internal/config).
      # Defina ADMIN_PASS nos secrets da Coolify; este default só evita crash no 1.º deploy.
      - ADMIN_PASS=${ADMIN_PASS:-snatcher-coolify-initial-password}
      - SCAN_INTERVAL=${SCAN_INTERVAL:-30}
      - EVOLUTION_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - APP_DOMAIN=${APP_DOMAIN:-jon.promo}
      - ML_CLIENT_ID=${ML_CLIENT_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
    depends_on:
      snatcher-postgres:
        condition: service_healthy
      evolution:
        condition: service_started
    networks:
      default: {}
      nuvem:
        aliases:
          - snatcher-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: coolify/Dockerfile.frontend
    environment:
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default: {}
      nuvem:
        aliases:
          - snatcher-frontend
      # Rede do proxy do Coolify (Traefik) — necessária pro roteamento HTTP público.
      coolify:
        aliases:
          - snatcher-frontend-svc
    labels:
      - traefik.docker.network=coolify
    restart: unless-stopped

volumes:
  evo_instances:
  evo_pg_data:
  evo_redis_data:
  snatcher-data:
  snatcher-pg-data:

networks:
  nuvem:
    external: true
    name: nuvem_nuvem
  # Rede externa do proxy do Coolify (Traefik). É a mesma rede em que o coolify-proxy
  # roda — os serviços expostos publicamente (backend, frontend) precisam estar nela
  # pro Traefik criar o router a partir do domínio configurado na UI.
  coolify:
    external: true
