# Workflows oficiais ficam na RAIZ do repositório (GitHub só lê .github/workflows/):
#   .github/workflows/ci.yml      — lint, test, build (backend-go)
#   .github/workflows/deploy.yml  — Coolify após CI na main + workflow_dispatch
#
# Secrets (Actions → production ou repo):
#   COOLIFY_TOKEN          — obrigatório
#   COOLIFY_WEBHOOK_URL    — opcional (URL completa do deploy webhook Coolify)
#
# Variables (environment production recomendado):
#   COOLIFY_RESOURCE_UUID  — uuid da Application (se não usar webhook)
#   COOLIFY_URL            — default https://coolify.autibequi.com
#   APP_URL                — default https://snatcher.autibequi.com
