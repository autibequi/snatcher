run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - gosec
    - revive
    - errcheck
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - govet

output:
  formats:
    - format: colored-line-number

issues:
  exclude-rules:
    # Relax linters for test files
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - dupl

    # Ignore migration SQL embed files
    - path: internal/db/migrations
      linters:
        - all

    # Idiomatic Go: ignore errcheck on defer Close() calls
    - linters:
        - errcheck
      text: "defer .*\\.Close\\("
