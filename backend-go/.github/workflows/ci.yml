name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint Status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false
          cache-dependency-path: backend-go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend-go
          args: --config .golangci.yml

  test:
    name: Test Status
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: snatcher_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d snatcher_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:ci@localhost:5432/snatcher_ci?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: backend-go/go.sum

      - name: Run migrations
        run: make migrate

      - name: Run tests
        run: make test

  build:
    name: Build Status
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: backend-go/go.sum

      # Paridade com Dockerfile (tags=nosqlite, sem CGO, -p 1) — falha aqui = mesmo erro no Coolify.
      - name: Build packages + binaries (Dockerfile parity)
        env:
          CGO_ENABLED: "0"
          GOMAXPROCS: "1"
          GOGC: "10"
        run: |
          go build -tags=nosqlite -buildvcs=false -trimpath -p 1 ./...
          go build -tags=nosqlite -buildvcs=false -trimpath -p 1 -ldflags="-s -w" -o /tmp/backendv2 ./cmd/server
          go build -tags=nosqlite -buildvcs=false -trimpath -p 1 -ldflags="-s -w" -o /tmp/seed ./cmd/seed
          go build -tags=nosqlite -buildvcs=false -trimpath -p 1 -ldflags="-s -w" -o /tmp/public ./cmd/public
