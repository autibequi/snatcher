# Casos de teste para o prompt compose.
# Cada caso representa um produto real enviado ao LLM para gerar mensagem WA.
- name: compose_eletronico_barato
  operation: compose
  input:
    product: "Smartphone Samsung Galaxy A15 128GB"
    price: 899
    discount: 15
    marketplace: "americanas"
    channel: "ofertas_tech"
  expected:
    contains_keywords:
      - samsung
      - r$
    matches_schema: true
    not_empty: true

