# Casos de teste para o prompt cluster_label.
# Cobre clusters com perfis distintos de audiência.
- name: cluster_label_eletronicos_alto_ctr
  operation: cluster_label
  input:
    categories:
      - "eletronicos"
      - "informatica"
    ctr_avg: 0.08
    ticket_avg: 1500
    click_count: 2400
  expected:
    contains_keywords:
      - label
    matches_schema: true
    not_empty: true

