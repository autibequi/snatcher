# Resolve DNS dinamicamente — sem cache de startup
# DNS Podman: 10.89.4.1 | Docker: 127.0.0.11
# Detecta automaticamente via variável de ambiente se disponível
resolver 10.89.4.1 valid=10s ipv6=off;

# Promo Snatcher — porta 80
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Short links v1 (/r/) e v2 catálogo (/v/) — roteados pelo backend Go
    location /r/ {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location /v/ {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /canal/ {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location /join/ {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # API backend
    location /api/ {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Prometheus metrics — backend Go expoe em /metrics (Fase 0)
    # Considere restringir a IPs internos antes de expor publicamente.
    location = /metrics {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA catch-all (Frontpage + Admin — React Router resolve)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Evolution Manager — porta 8081 (SPA na raiz)
server {
    listen 8081;

    location / {
        set $evo http://snatcher-evolution:8080;
        proxy_pass $evo/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
