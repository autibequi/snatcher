# Resolve DNS dinamicamente — sem cache de startup
# DNS Podman: 10.89.4.1 | Docker: 127.0.0.11
# Detecta automaticamente via variável de ambiente se disponível
resolver 10.89.4.1 valid=10s ipv6=off;

# Dual-entry SPA: seleciona bundle com base no Host header
#   jon.promo / www.jon.promo → public.html (bundle público)
#   qualquer outro host        → index.html  (admin bundle)
map $http_host $spa_entry {
    default         /index.html;
    "jon.promo"     /public.html;
    "www.jon.promo" /public.html;
}

# Promo Snatcher — porta 80
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Camada PÚBLICA (app separada — snatcher-public:8001) ─────────────────
    # Short links, group picker, links públicos → app pública isolada do admin
    location /r/ {
        set $public http://snatcher-public:8001;
        proxy_pass $public$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location /v/ {
        set $public http://snatcher-public:8001;
        proxy_pass $public$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /g/ {
        set $public http://snatcher-public:8001;
        proxy_pass $public$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location /canal/ {
        set $public http://snatcher-public:8001;
        proxy_pass $public$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location /join/ {
        set $public http://snatcher-public:8001;
        proxy_pass $public$request_uri;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /canais/ {
        set $public http://snatcher-public:8001;
        proxy_pass $public$request_uri;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # API backend
    location /api/ {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Prometheus metrics — backend Go expoe em /metrics (Fase 0)
    # Considere restringir a IPs internos antes de expor publicamente.
    location = /metrics {
        set $backend http://snatcher-backend:8000;
        proxy_pass $backend/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA catch-all — usa $spa_entry definido no map acima (http level)
    location / {
        try_files $uri $uri/ $spa_entry;
    }
}

# Evolution Manager — porta 8081 (SPA na raiz)
server {
    listen 8081;

    location / {
        set $evo http://snatcher-evolution:8080;
        proxy_pass $evo/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
