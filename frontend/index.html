<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snatcher</title>
    <script>
      window.GA_ID = '__GA_MEASUREMENT_ID__';
      if (window.GA_ID && !window.GA_ID.startsWith('__')) {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + window.GA_ID;
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', window.GA_ID, { send_page_view: true });
        // SPA: rastreia navegação entre rotas via History API
        var _pushState = history.pushState;
        history.pushState = function() {
          _pushState.apply(this, arguments);
          gtag('event', 'page_view', { page_location: location.href, page_title: document.title });
        };
        window.addEventListener('popstate', function() {
          gtag('event', 'page_view', { page_location: location.href, page_title: document.title });
        });
      }
    </script>
    <script>
      (function(){
        var s=localStorage;
        var t=s.getItem('snatcher.theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
        var d=s.getItem('snatcher.density')||'comfy';
        var a=s.getItem('snatcher.accent')||'indigo';
        document.documentElement.dataset.theme=t;
        document.documentElement.dataset.density=d;
        document.documentElement.dataset.accent=a;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
